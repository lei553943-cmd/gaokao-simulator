<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小伴 - AI伴侣</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  display:flex;justify-content:center;align-items:center;
  height:100vh;font-family:'PingFang SC','Microsoft YaHei',sans-serif;
}
#app{
  width:100%;max-width:480px;height:100vh;max-height:900px;
  display:flex;flex-direction:column;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.1);
}
#header{
  padding:16px 20px;
  background:rgba(255,255,255,0.06);
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;gap:12px;
}
#avatar{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#ff6b9d,#c44569);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
  animation:pulse 3s infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(255,107,157,0.4)}
  50%{box-shadow:0 0 0 12px rgba(255,107,157,0)}
}
#header-info{flex:1}
#header-name{color:#fff;font-size:17px;font-weight:bold}
#header-status{color:#aaa;font-size:12px;display:flex;align-items:center;gap:4px}
#header-status .dot{width:7px;height:7px;border-radius:50%;background:#4caf50;display:inline-block}
#header-status .dot.thinking{background:#ff9800;animation:blink 0.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
#clear-btn{
  background:none;border:1px solid rgba(255,255,255,0.2);color:#999;
  padding:6px 12px;border-radius:15px;cursor:pointer;font-size:12px;
  transition:all .2s;
}
#clear-btn:hover{color:#fff;border-color:rgba(255,255,255,0.5)}

#messages{
  flex:1;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;
}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}

.msg{display:flex;gap:8px;max-width:90%;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.bot{align-self:flex-start}

.msg .avatar-sm{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.msg.user .avatar-sm{background:linear-gradient(135deg,#4facfe,#00f2fe)}
.msg.bot .avatar-sm{background:linear-gradient(135deg,#ff6b9d,#c44569)}

.msg .bubble{
  padding:10px 14px;border-radius:18px;line-height:1.6;font-size:14px;
  word-break:break-word;
}
.msg.user .bubble{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  color:#fff;border-bottom-right-radius:4px;
}
.msg.bot .bubble{
  background:rgba(255,255,255,0.1);
  color:#e0e0e0;border-bottom-left-radius:4px;
}
.msg .time{font-size:10px;color:rgba(255,255,255,0.3);margin-top:4px}

#input-area{
  padding:12px 16px 16px;
  display:flex;gap:8px;
  border-top:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);
}
#input-box{
  flex:1;background:rgba(255,255,255,0.08);border:none;
  border-radius:20px;padding:10px 16px;color:#fff;font-size:14px;
  outline:none;resize:none;max-height:100px;
  font-family:inherit;line-height:1.4;
  transition:all .2s;
}
#input-box:focus{background:rgba(255,255,255,0.14)}
#input-box::placeholder{color:rgba(255,255,255,0.3)}
#send-btn{
  width:42px;height:42px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#ff6b9d,#c44569);
  color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;
  transition:all .2s;display:flex;align-items:center;justify-content:center;
}
#send-btn:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(255,107,157,0.4)}
#send-btn:disabled{opacity:0.4;transform:none;box-shadow:none}

#typing-indicator{
  display:none;align-self:flex-start;padding:8px 14px;
  background:rgba(255,255,255,0.08);border-radius:18px;
  border-bottom-left-radius:4px;
}
#typing-indicator .dots{display:flex;gap:4px}
#typing-indicator .dots span{
  width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.4);
  animation:bounce 1.4s infinite;
}
#typing-indicator .dots span:nth-child(2){animation-delay:.2s}
#typing-indicator .dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}

@media(max-width:500px){
  #app{border-radius:0;max-height:100vh}
}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="avatar">🌸</div>
    <div id="header-info">
      <div id="header-name">小伴</div>
      <div id="header-status"><span class="dot"></span> <span id="status-text">在线</span></div>
    </div>
    <button id="clear-btn" title="清除记忆">忘记我</button>
    <button id="settings-btn" title="API设置" style="background:none;border:1px solid rgba(255,255,255,0.2);color:#999;padding:6px 12px;border-radius:15px;cursor:pointer;font-size:12px;transition:all .2s">⚙️</button>
  </div>

  <div id="messages">
    <div class="msg bot">
      <div class="avatar-sm">🌸</div>
      <div>
        <div class="bubble">嗨~ 我是小伴 🌸<br>今天过得怎么样？有什么想聊的吗？</div>
      </div>
    </div>
  </div>

  <div id="typing-indicator">
    <div class="dots"><span></span><span></span><span></span></div>
  </div>

  <div id="input-area">
    <textarea id="input-box" rows="1" placeholder="说点什么吧..."></textarea>
    <button id="send-btn">➤</button>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;justify-content:center;align-items:center">
  <div style="background:#1e2d3d;border-radius:16px;padding:30px;max-width:440px;width:90%;color:#fff;border:1px solid rgba(255,255,255,0.1)">
    <h2 style="margin-bottom:20px;font-size:20px">⚙️ API 设置</h2>
    <p style="color:#aaa;font-size:13px;margin-bottom:16px">配置 OpenAI 兼容的 API 端点。支持任何兼容接口（Claude API、OpenAI、本地模型等）。</p>
    <label style="display:block;margin-bottom:6px;font-size:13px;color:#aaa">API 地址</label>
    <input id="cfg-url" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:#fff;margin-bottom:12px;font-size:13px;outline:none" placeholder="https://api.openai.com/v1/chat/completions">
    <label style="display:block;margin-bottom:6px;font-size:13px;color:#aaa">API Key</label>
    <input id="cfg-key" type="password" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:#fff;margin-bottom:12px;font-size:13px;outline:none" placeholder="sk-...">
    <label style="display:block;margin-bottom:6px;font-size:13px;color:#aaa">模型名称</label>
    <input id="cfg-model" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:#fff;margin-bottom:20px;font-size:13px;outline:none" placeholder="gpt-4o">
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button id="cfg-cancel" style="padding:10px 24px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:none;color:#aaa;cursor:pointer;font-size:14px">取消</button>
      <button id="cfg-save" style="padding:10px 24px;border-radius:8px;border:none;background:linear-gradient(135deg,#ff6b9d,#c44569);color:#fff;cursor:pointer;font-size:14px;font-weight:bold">保存</button>
    </div>
  </div>
</div>

<script>
const API = window.location.protocol === 'file:' ? 'http://127.0.0.1:8765' : window.location.origin;
const msgContainer = document.getElementById('messages');
const inputBox = document.getElementById('input-box');
const sendBtn = document.getElementById('send-btn');
const typing = document.getElementById('typing-indicator');
const statusDot = document.querySelector('#header-status .dot');
const statusText = document.getElementById('status-text');
const clearBtn = document.getElementById('clear-btn');
let isWaiting = false;

// ── Auto-resize input ─────────────────────────────────
inputBox.addEventListener('input', () => {
  inputBox.style.height = 'auto';
  inputBox.style.height = Math.min(inputBox.scrollHeight, 100) + 'px';
});

// ── Send ──────────────────────────────────────────────
async function send() {
  let text = inputBox.value.trim();
  if (!text || isWaiting) return;

  addMessage('user', text);
  inputBox.value = '';
  inputBox.style.height = 'auto';
  inputBox.focus();

  isWaiting = true;
  sendBtn.disabled = true;
  showTyping(true);
  setStatus('thinking', '思考中...');

  try {
    let resp = await fetch(API + '/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text}),
    });
    let data = await resp.json();
    addMessage('bot', data.reply);
  } catch(e) {
    addMessage('bot', '😴 连接不到服务器... 请在浏览器打开 http://127.0.0.1:8765 而不是直接打开文件');
  }

  showTyping(false);
  sendBtn.disabled = false;
  setStatus('online', '在线');
}

sendBtn.addEventListener('click', send);
inputBox.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// ── Messages ──────────────────────────────────────────
function addMessage(role, content) {
  let div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');

  let avatar = role === 'user' ? '😎' : '🌸';
  let now = new Date();
  let time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

  div.innerHTML = `
    <div class="avatar-sm">${avatar}</div>
    <div>
      <div class="bubble">${escapeHtml(content)}</div>
      <div class="time">${time}</div>
    </div>
  `;

  // Replace typing indicator with this message
  let indicator = document.getElementById('typing-indicator');
  msgContainer.insertBefore(div, indicator);
  msgContainer.scrollTop = msgContainer.scrollHeight;
}

function showTyping(show) {
  typing.style.display = show ? 'flex' : 'none';
  if (show) msgContainer.scrollTop = msgContainer.scrollHeight;
}

function setStatus(state, text) {
  statusDot.className = 'dot ' + (state === 'thinking' ? 'thinking' : '');
  statusText.textContent = text;
}

function escapeHtml(text) {
  let div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ── Load history ──────────────────────────────────────
async function loadHistory() {
  try {
    let resp = await fetch(API + '/history');
    let data = await resp.json();
    if (data.messages && data.messages.length > 0) {
      // Remove default greeting
      msgContainer.querySelector('.msg.bot')?.remove();
      // Rebuild
      let indicator = document.getElementById('typing-indicator');
      for (let m of data.messages.slice(-50)) {
        let div = document.createElement('div');
        div.className = 'msg ' + (m.role === 'user' ? 'user' : 'bot');
        let avatar = m.role === 'user' ? '😎' : '🌸';
        let time = m.time ? m.time.slice(11,16) : '';
        div.innerHTML = `
          <div class="avatar-sm">${avatar}</div>
          <div>
            <div class="bubble">${escapeHtml(m.content)}</div>
            <div class="time">${time}</div>
          </div>
        `;
        msgContainer.insertBefore(div, indicator);
      }
      msgContainer.scrollTop = msgContainer.scrollHeight;
    }
  } catch(e) {}
}

// ── Clear history ─────────────────────────────────────
clearBtn.addEventListener('click', async () => {
  if (!confirm('确定要清除所有对话记忆吗？')) return;
  try { await fetch(API + '/history', {method:'DELETE'}); } catch(e) {}
  msgContainer.innerHTML = '';
  // Re-add greeting
  let indicator = document.getElementById('typing-indicator');
  let div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `
    <div class="avatar-sm">🌸</div>
    <div>
      <div class="bubble">嗨~ 我是小伴 🌸<br>今天过得怎么样？有什么想聊的吗？</div>
    </div>
  `;
  msgContainer.insertBefore(div, indicator);
});

// ── Init ──────────────────────────────────────────────
loadHistory();
loadSettings();

// ── Settings modal ─────────────────────────────────────
const settingsBtn = document.getElementById('settings-btn');
const settingsModal = document.getElementById('settings-modal');
const cfgUrl = document.getElementById('cfg-url');
const cfgKey = document.getElementById('cfg-key');
const cfgModel = document.getElementById('cfg-model');

settingsBtn.addEventListener('click', () => {
  settingsModal.style.display = 'flex';
  loadSettings();
});

document.getElementById('cfg-cancel').addEventListener('click', () => {
  settingsModal.style.display = 'none';
});

document.getElementById('cfg-save').addEventListener('click', async () => {
  try {
    await fetch(API + '/settings', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        api_url: cfgUrl.value.trim(),
        api_key: cfgKey.value.trim(),
        model: cfgModel.value.trim(),
      }),
    });
  } catch(e) {}
  settingsModal.style.display = 'none';
});

settingsModal.addEventListener('click', (e) => {
  if (e.target === settingsModal) settingsModal.style.display = 'none';
});

async function loadSettings() {
  try {
    let resp = await fetch(API + '/settings');
    let data = await resp.json();
    if (data.api_url) cfgUrl.value = data.api_url;
    if (data.model) cfgModel.value = data.model;
  } catch(e) {}
}
</script>
</body>
</html>
