<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a2e; font-family: Arial; }
  .container { text-align: center; }
  canvas { border: 2px solid #e94560; background: #16213e; }
  .score { color: #e94560; font-size: 24px; margin-bottom: 10px; }
  .game-over { color: #0f3460; font-size: 20px; margin-top: 10px; height: 24px; }
</style>
</head>
<body>
<div class="container">
  <div class="score">分数: <span id="score">0</span></div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div class="game-over" id="game-over"></div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const gameOverEl = document.getElementById('game-over');

const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

let snake, food, dir, nextDir, score, gameOver, speed, loop;

function init() {
  snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
  food = spawnFood();
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  gameOver = false;
  speed = 100;
  scoreEl.textContent = '0';
  gameOverEl.textContent = '';
  clearInterval(loop);
  loop = setInterval(update, speed);
}

function spawnFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  return pos;
}

function update() {
  if (gameOver) return;

  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s => s.x === head.x && s.y === head.y)) {
    clearInterval(loop);
    gameOverEl.textContent = '游戏结束！按空格键重新开始';
    return;
  }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    food = spawnFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#e94560';
  ctx.fillRect(food.x * GRID, food.y * GRID, GRID - 1, GRID - 1);

  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#0f3460' : '#533483';
    ctx.fillRect(s.x * GRID, s.y * GRID, GRID - 1, GRID - 1);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === ' ' && gameOverEl.textContent) { init(); return; }
  const keyMap = { ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 }, ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 } };
  const d = keyMap[e.key];
  if (!d) return;
  if (d.x + dir.x === 0 && d.y + dir.y === 0) return;
  nextDir = d;
  e.preventDefault();
});

init();
</script>
</body>
</html>
