<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>未来人格测试 | 你的2035年会怎样？</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --accent: #a855f7;
    --accent2: #06b6d4;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --gold: #f59e0b;
    --pink: #ec4899;
    --green: #10b981;
    --blue: #3b82f6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; top:0; left:0; right:0; bottom:0;
    background: radial-gradient(ellipse at 20% 20%, rgba(168,85,247,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.06) 0%, transparent 50%);
    pointer-events: none; z-index:0;
  }
  .container {
    position: relative; z-index:1;
    width: min(520px, 92vw);
    padding: 20px 0 40px;
  }

  /* header */
  .header {
    text-align: center; margin-bottom: 24px;
  }
  .header .emoji { font-size: 48px; margin-bottom: 8px; }
  .header h1 {
    font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .sub {
    color: var(--muted); font-size: 14px; margin-top: 4px;
  }

  /* progress */
  .progress-wrap {
    background: var(--card); border-radius: 20px; height: 6px;
    margin-bottom: 28px; overflow: hidden;
  }
  .progress-bar {
    height: 100%; border-radius: 20px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
    width: 0%;
  }

  /* card */
  .card {
    background: var(--card);
    border-radius: 20px; padding: 32px 28px;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    transition: opacity 0.3s, transform 0.3s;
  }
  .card.fade-out {
    opacity: 0; transform: translateY(-12px);
  }
  .card.fade-in {
    animation: slideIn 0.35s ease;
  }
  @keyframes slideIn {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }

  .q-num {
    font-size: 12px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--accent); margin-bottom: 12px; font-weight: 700;
  }
  .q-title {
    font-size: 20px; font-weight: 700; margin-bottom: 24px;
    line-height: 1.4;
  }

  /* options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: rgba(255,255,255,0.03);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 16px 20px;
    cursor: pointer; transition: all 0.2s;
    font-size: 15px; display: flex; align-items: center; gap: 12px;
  }
  .option:hover {
    border-color: var(--accent);
    background: rgba(168,85,247,0.08);
    transform: translateX(2px);
  }
  .option:active { transform: scale(0.985); }
  .option .mark {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 14px; transition: all 0.2s;
  }
  .option:hover .mark {
    border-color: var(--accent); background: rgba(168,85,247,0.15);
  }

  /* result */
  .result-wrap { text-align: center; }
  .result-emoji { font-size: 80px; margin-bottom: 16px; }
  .result-type {
    display: inline-block;
    padding: 4px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 700; letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .result-type.A { background: rgba(168,85,247,0.2); color: #c084fc; }
  .result-type.B { background: rgba(245,158,11,0.2); color: #fbbf24; }
  .result-type.C { background: rgba(6,182,212,0.2); color: #22d3ee; }
  .result-type.D { background: rgba(236,72,153,0.2); color: #f472b6; }
  .result-type.E { background: rgba(16,185,129,0.2); color: #34d399; }
  .result-title {
    font-size: 26px; font-weight: 800; margin-bottom: 12px;
  }
  .result-desc {
    color: var(--muted); font-size: 15px; line-height: 1.7;
    margin-bottom: 10px;
  }
  .result-traits {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    margin: 20px 0;
  }
  .trait {
    padding: 6px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 600;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn {
    display: inline-block; padding: 12px 32px; border-radius: 30px;
    font-size: 15px; font-weight: 700; border: none; cursor: pointer;
    transition: all 0.2s; color: #fff; margin: 6px;
    background: var(--accent);
  }
  .btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn.ghost {
    background: transparent; border: 2px solid rgba(255,255,255,0.2);
    color: var(--text);
  }
  .btn.ghost:hover { border-color: var(--accent); }

  /* share modal */
  .overlay {
    position: fixed; inset:0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 99; animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .share-card {
    background: var(--card); border-radius: 20px; padding: 28px;
    text-align: center; width: min(360px, 86vw);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .share-card h3 { margin-bottom: 8px; }
  .share-card textarea {
    width: 100%; height: 80px; border-radius: 12px;
    background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
    color: var(--text); padding: 12px; font-size: 14px;
    resize: none; margin: 12px 0; font-family: inherit;
  }

  /* responsive */
  @media (max-width: 480px) {
    .card { padding: 24px 18px; }
    .q-title { font-size: 18px; }
    .result-emoji { font-size: 60px; }
    .result-title { font-size: 22px; }
    .header h1 { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="emoji">&#128302;</div>
    <h1>2035 未来人格测试</h1>
    <div class="sub">你的选择，决定你的未来剧本</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress"></div>
  </div>

  <div class="card" id="card"></div>
</div>

<script>
// ═══════════ 题库 ═══════════
const questions = [
  {
    q: "周五晚上，你最可能在做什么？",
    options: [
      { text: "在家研究刚学的 AI 工具，做了个自动化脚本", scores: {A:3, B:1, C:2, D:1, E:1} },
      { text: "跟三五好友约火锅/烧烤，聊到半夜", scores: {A:1, B:3, C:1, D:2, E:1} },
      { text: "刷小红书/抖音，看旅行攻略，订了张明天出发的票", scores: {A:1, B:1, C:1, D:3, E:2} },
      { text: "打开了 3 个网课但实际在打游戏，顺便思考人生意义", scores: {A:2, B:1, C:3, D:1, E:2} },
    ]
  },
  {
    q: "老板让你做一个完全没接触过的项目，你的反应是？",
    options: [
      { text: "兴奋！立刻打开 GPT 开始研究，三天出方案", scores: {A:3, B:1, C:2, D:1, E:1} },
      { text: "先把团队拽进会议室，脑暴两小时再说", scores: {A:1, B:3, C:1, D:1, E:2} },
      { text: "\"我试试，不行别怪我\"，然后默默卷到凌晨", scores: {A:2, B:1, C:2, D:1, E:3} },
      { text: "先发朋友圈吐槽，获得 20 个赞后开干", scores: {A:1, B:2, C:1, D:3, E:1} },
    ]
  },
  {
    q: "你觉得十年后最值钱的能力是什么？",
    options: [
      { text: "审美和品味 — AI 能算但不懂什么叫\"好看\"", scores: {A:1, B:1, C:1, D:3, E:2} },
      { text: "提问的能力 — 会问对问题比会写代码重要", scores: {A:3, B:1, C:2, D:1, E:1} },
      { text: "共情和连接 — 人和人的信任永远稀缺", scores: {A:1, B:3, C:1, D:1, E:2} },
      { text: "快速试错 — 不怕搞砸，就怕不动", scores: {A:1, B:2, C:2, D:1, E:3} },
    ]
  },
  {
    q: "关于钱，哪句话最戳你？",
    options: [
      { text: "\"被动收入超过工资\" — 自由的底气", scores: {A:2, B:1, C:3, D:2, E:1} },
      { text: "\"35 岁退休环游世界\" — 不被定义的人生", scores: {A:1, B:2, C:1, D:3, E:2} },
      { text: "\"先赚它一个小目标\" — 搞钱就是最好的修行", scores: {A:1, B:3, C:1, D:1, E:1} },
      { text: "\"够花就行，但要有做自己的自由\" — 反内卷宣言", scores: {A:1, B:1, C:1, D:2, E:3} },
    ]
  },
  {
    q: "如果给 2035 年的自己发一条消息，你会写？",
    options: [
      { text: "\"你做的东西，有人用了吗？\"", scores: {A:3, B:1, C:2, D:1, E:1} },
      { text: "\"你身边还是那群人吗？\"", scores: {A:1, B:3, C:1, D:2, E:1} },
      { text: "\"你自由了吗？\"", scores: {A:1, B:1, C:2, D:3, E:2} },
      { text: "\"你还在做自己吗？\"", scores: {A:1, B:2, C:1, D:1, E:3} },
    ]
  },
  {
    q: "你对 AI 取代人类工作的态度是？",
    options: [
      { text: "\"会用 AI 的人取代不会用的人\" — 已经在卷 prompt 了", scores: {A:3, B:1, C:2, D:1, E:1} },
      { text: "\"人类的核心价值是创造和连接，AI 替代不了\"", scores: {A:1, B:3, C:1, D:2, E:2} },
      { text: "\"太好了，希望 AI 替我上班，我只想躺着\"", scores: {A:1, B:1, C:3, D:1, E:2} },
      { text: "\"有点焦虑，但决定先吃顿好的压压惊\"", scores: {A:1, B:2, C:1, D:3, E:1} },
    ]
  },
  {
    q: "创业还是上班？",
    options: [
      { text: "已经在做了 — 副业比主业赚得多", scores: {A:2, B:2, C:3, D:1, E:1} },
      { text: "\"等我攒够启动资金和团队就辞职\"", scores: {A:2, B:3, C:1, D:1, E:1} },
      { text: "\"大厂干到 30 岁，然后做独立开发者\"", scores: {A:3, B:1, C:1, D:2, E:1} },
      { text: "\"上班摸鱼，下班搞事，两条腿走路\"", scores: {A:1, B:1, C:2, D:1, E:3} },
    ]
  },
  {
    q: "周末刷到一张特价机票去冰岛，你的下一步？",
    options: [
      { text: "查年假余额 → 发请假邮件 → 下单，一气呵成", scores: {A:2, B:1, C:1, D:3, E:2} },
      { text: "截图发群里\"好想去啊啊啊\"，然后继续刷手机", scores: {A:1, B:3, C:1, D:2, E:1} },
      { text: "算了，这个月房贷/房租还没交呢", scores: {A:1, B:1, C:3, D:1, E:2} },
      { text: "马上开始做攻略，顺便看看能不能 remote work 一个月", scores: {A:1, B:1, C:2, D:2, E:3} },
    ]
  },
];

// ═══════════ 结果类型 ═══════════
const results = {
  A: {
    type: "A", typeName: "赛博造物主",
    emoji: "\u{1F916}",
    title: "AI 时代的技术先驱",
    color: "#a855f7",
    desc: "你就是那种\"别人还在震惊，你已经把工具玩明白了\"的人。2035 年的你大概率在做一个自己的产品，可能是一个 AI Native 应用、一个开源项目，或者一个只有你会用的效率系统。你不会被替代，因为你就是替代别人的那个人。",
    traits: ["AI Native", "Maker", "技术乐观", "产品思维", "终身学习"],
  },
  B: {
    type: "B", typeName: "社交磁铁",
    emoji: "\u{1F30D}",
    title: "人脉网络的超级节点",
    color: "#f59e0b",
    desc: "你的超能力是\"让事情因为你而发生\"。2035 年的你可能是一个社群的发起者、一个跨界的连接者，或者一个团队里那个\"没你不行\"的人。技术可以替代很多，替代不了让人愿意跟着你干的魅力。",
    traits: ["超级连接者", "感染力", "信任资产", "资源撮合", "社群领袖"],
  },
  C: {
    type: "C", typeName: "佛系卷王",
    emoji: "\u{1F9D8}",
    title: "躺不平也卷不动的清醒派",
    color: "#06b6d4",
    desc: "你比任何人都清楚：真正的解脱不是拼命卷赢，也不是彻底躺平，而是建立自己的规则。2035 年的你很可能有一个\"刚好够用\"的被动收入系统，工作时间自己定，看起来佛系但谁也卷不动你。",
    traits: ["FIRE 践行者", "极简主义", "自动化狂魔", "性价比王者", "精神自由"],
  },
  D: {
    type: "D", typeName: "野生艺术家",
    emoji: "\u{1F3A8}",
    title: "审美驱动的自由灵魂",
    color: "#ec4899",
    desc: "你对\"丑\"的容忍度为零。2035 年，你可能在做一个独立品牌、一个内容账号、或者一份\"别人看不懂但你觉得特别值\"的事业。AI 能做效率，做不了品味。你就是那个定义\"什么是好\"的人。",
    traits: ["品味自信", "内容创作者", "品牌意识", "体验至上", "自由职业"],
  },
  E: {
    type: "E", typeName: "野生哲学家",
    emoji: "\u{1F31F}",
    title: "活明白的人",
    color: "#10b981",
    desc: "你不追逐别人的节奏，你只关心\"这是不是我想要的\"。2035 年的你不一定最有钱或最成功，但一定是最自洽的那个。可能在做一份小众但热爱的工作，可能在旅居，可能在养花种菜。反正，你挺快乐的。",
    traits: ["自洽", "反内卷", "精神富足", "小众热爱", "活得清醒"],
  },
};

// ═══════════ 状态 ═══════════
let scores = {A:0, B:0, C:0, D:0, E:0};
let currentQ = 0;
const totalQ = questions.length;

// ═══════════ 渲染 ═══════════
const card = document.getElementById('card');
const progress = document.getElementById('progress');

function renderQuestion(idx) {
  if (idx >= totalQ) { showResult(); return; }
  progress.style.width = ((idx / totalQ) * 100) + '%';
  const q = questions[idx];
  card.className = 'card fade-in';
  card.innerHTML = `
    <div class="q-num">第 ${idx+1} / ${totalQ} 题</div>
    <div class="q-title">${q.q}</div>
    <div class="options">
      ${q.options.map((o, i) => `
        <div class="option" onclick="select(${idx}, ${i})">
          <div class="mark">${String.fromCharCode(65+i)}</div>
          <div>${o.text}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function select(qIdx, optIdx) {
  const scores_to_add = questions[qIdx].options[optIdx].scores;
  for (const [k, v] of Object.entries(scores_to_add)) {
    scores[k] += v;
  }
  card.classList.add('fade-out');
  setTimeout(() => {
    currentQ++;
    renderQuestion(currentQ);
  }, 200);
}

function getResult() {
  let maxK = 'A', maxV = 0;
  for (const [k, v] of Object.entries(scores)) {
    if (v > maxV) { maxV = v; maxK = k; }
  }
  return results[maxK];
}

function showResult() {
  progress.style.width = '100%';
  const r = getResult();
  card.className = 'card fade-in';
  card.innerHTML = `
    <div class="result-wrap">
      <div class="result-emoji">${r.emoji}</div>
      <div class="result-type ${r.type}">${r.typeName}</div>
      <div class="result-title">${r.title}</div>
      <div class="result-desc">${r.desc}</div>
      <div class="result-traits">
        ${r.traits.map(t => `<span class="trait">${t}</span>`).join('')}
      </div>
      <div style="margin-top:24px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
        <button class="btn" onclick="shareResult()">\u{1F517} 分享结果</button>
        <button class="btn ghost" onclick="retake()">\u{1F504} 重新测试</button>
      </div>
      <div style="margin-top:16px;font-size:13px;color:var(--muted);">
        <details>
          <summary style="cursor:pointer;">查看详细得分</summary>
          <div style="margin-top:8px;text-align:left;padding:12px;background:rgba(0,0,0,0.2);border-radius:12px;font-size:12px;line-height:2;">
            ${['A','B','C','D','E'].map(k => {
              const name = results[k].typeName;
              const bar = '█'.repeat(scores[k]) + '░'.repeat(Math.max(0, 15 - scores[k]));
              return `${bar} ${name} (${scores[k]}分)`;
            }).join('<br>')}
          </div>
        </details>
      </div>
    </div>
  `;
}

function shareResult() {
  const r = getResult();
  const text = `\u{1F302} 我的 2035 未来人格：${r.emoji} ${r.typeName} — ${r.title}\n\n${r.desc.split('。')[0]}。\n\n你的未来会怎样？来测测 \u{1F447}`;
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `
    <div class="share-card">
      <h3>\u{1F4E4} 分享你的结果</h3>
      <textarea readonly id="shareText">${text}</textarea>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
        <button class="btn" onclick="copyShare()">\u{1F4CB} 一键复制</button>
        <button class="btn ghost" onclick="this.closest('.overlay').remove()">关闭</button>
      </div>
    </div>
  `;
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
  document.body.appendChild(ov);
}

function copyShare() {
  const ta = document.getElementById('shareText');
  ta.select(); document.execCommand('copy');
  const btn = event.target;
  btn.textContent = '✅ 已复制！';
  setTimeout(() => { btn.textContent = '\u{1F4CB} 一键复制'; }, 2000);
}

function retake() {
  scores = {A:0, B:0, C:0, D:0, E:0};
  currentQ = 0;
  renderQuestion(0);
}

// start
renderQuestion(0);
</script>
</body>
</html>
